spring:
  profiles:
    active: dev
  security:
    enabled: false
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope: openid, email, profile
  jpa:
    open-in-view: false
#    show-sql: true
    properties:
      hibernate:
        default_schema: public
#        format_sql: true
#        generate_statistics: true
        jdbc:
          batch_size: 50
          batch_versioned_data: true
        order_inserts: true
        order_updates: true
        naming:
          physical-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
          implicit-strategy: org.springframework.boot.orm.jpa.hibernate.SpringImplicitNamingStrategy


#      Audyt - Envers
      org.hibernate.envers.audit_table_suffix: _AUD
      org.hibernate.envers.revision_field_name: REV
      org.hibernate.envers.revision_type_field_name: REVTYPE
      org.hibernate.envers.default_schema: audit
      org.hibernate.envers.store_data_at_delete: true

  datasource:
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 30000            # 30 sekund
      max-lifetime: 600000           # 10 minut
      connection-timeout: 5000       # 5 sekund
      leak-detection-threshold: 60000  # 60 sekund

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 3000
          writetimeout: 5000

app:
  security:
    jwt:
      secret: ${JWT_SECRET}
      access-token-expiration-ms: 900_000     # 15 minut
      refresh-token-expiration-ms: 259_200_000  # 3 dni
    cookie:
      secure: false  # true na produkcji (HTTPS)
    rate-limit:
      max-login-attempts: 5
      lock-duration-minutes: 15
      max-email-tokens-per-hour: 3
    cors:
      allowed-origins: "http://localhost:3000"
      allowed-methods: "GET, POST, PUT, DELETE, OPTIONS, PATCH"
      allowed-headers: "Content-Type, Authorization, X-Requested-With, Accept, Origin"
      allow-credentials: true
      max-age: 3600

google:
  credentials:
    folder:
      path: classpath:token/serviceAccount.json

coinmarketcap:
  api:
    key: ${COINMARKETCAP_API_KEY}

path:
  file:
    excel: src/main/resources/tmp_files/

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics
  endpoint:
    prometheus:
      enabled: true

